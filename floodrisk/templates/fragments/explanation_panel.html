{# Панель режима «Объяснение»: топ-N признаков + переключатели слоёв важности. Этап 5. #}
<div
  id="explanation-data"
  class="hidden"
  data-explanation-id="{{ explanation_id }}"
  data-attribution-layers="{{ attribution_layers | tojson }}"
></div>

<section class="border-t border-slate-200 bg-white p-3 text-sm">
  <h3 class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">Топ признаков</h3>
  <ol class="space-y-1">
    {% for f in ranking %}
    <li class="flex items-center justify-between">
      <span>{{ f.feature }}</span>
      <span class="font-mono text-slate-600">{{ "%.2f"|format(f.importance) }}</span>
    </li>
    {% endfor %}
  </ol>
</section>
